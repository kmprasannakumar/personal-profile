<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Fix My Campus Issue Tracking Platform</title>
  <desc id="desc">Campus issue reporting dashboard with tickets, categories, and progress stats.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2a1f"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="170" fill="#4ade80" opacity="0.16"/>
  <circle cx="160" cy="650" r="220" fill="#22c55e" opacity="0.12"/>

  <rect x="90" y="90" width="1020" height="580" rx="28" fill="#123a2a" stroke="#86efac" stroke-opacity="0.42"/>
  <text x="145" y="160" fill="#dcfce7" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Fix My Campus</text>
  <text x="145" y="198" fill="#bbf7d0" font-size="22" font-family="Segoe UI, Arial, sans-serif">Report, track, and resolve infrastructure issues</text>

  <rect x="145" y="250" width="450" height="360" rx="18" fill="#14532d"/>
  <rect x="620" y="250" width="440" height="170" rx="18" fill="#166534"/>
  <rect x="620" y="440" width="440" height="170" rx="18" fill="#15803d"/>

  <rect x="180" y="290" width="380" height="54" rx="10" fill="#22c55e"/>
  <rect x="180" y="366" width="300" height="54" rx="10" fill="#22c55e"/>
  <rect x="180" y="442" width="340" height="54" rx="10" fill="#22c55e"/>
  <rect x="180" y="518" width="250" height="54" rx="10" fill="#22c55e"/>

  <text x="655" y="315" fill="#dcfce7" font-size="20" font-family="Segoe UI, Arial, sans-serif">Open Tickets</text>
  <text x="655" y="350" fill="#86efac" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">128</text>

  <text x="655" y="505" fill="#dcfce7" font-size="20" font-family="Segoe UI, Arial, sans-serif">Resolved This Week</text>
  <text x="655" y="540" fill="#86efac" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">74</text>
</svg>
