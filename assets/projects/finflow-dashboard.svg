<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">FinFlow Loan Risk Intelligence Dashboard</title>
  <desc id="desc">Fintech analytics dashboard with KPIs, charts, and risk indicators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e2b"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="kpi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="160" fill="#6ee7b7" opacity="0.14"/>
  <circle cx="130" cy="680" r="190" fill="#14b8a6" opacity="0.16"/>

  <rect x="90" y="90" width="1020" height="580" rx="28" fill="#042f2e" stroke="#6ee7b7" stroke-opacity="0.35"/>
  <text x="140" y="160" fill="#ccfbf1" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">FinFlow Loan Risk Intelligence</text>
  <text x="140" y="198" fill="#99f6e4" font-size="23" font-family="Segoe UI, Arial, sans-serif">Portfolio analytics, risk monitoring, ML predictions</text>

  <rect x="140" y="240" width="210" height="105" rx="14" fill="url(#kpi)"/>
  <rect x="370" y="240" width="210" height="105" rx="14" fill="url(#kpi)"/>
  <rect x="600" y="240" width="210" height="105" rx="14" fill="url(#kpi)"/>
  <rect x="830" y="240" width="210" height="105" rx="14" fill="url(#kpi)"/>

  <text x="165" y="286" fill="#022c22" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Total Loans</text>
  <text x="395" y="286" fill="#022c22" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Default Rate</text>
  <text x="625" y="286" fill="#022c22" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Avg EMI</text>
  <text x="855" y="286" fill="#022c22" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Risk Score</text>

  <rect x="140" y="380" width="560" height="230" rx="16" fill="#064e49" stroke="#2dd4bf" stroke-opacity="0.45"/>
  <rect x="730" y="380" width="310" height="230" rx="16" fill="#064e49" stroke="#2dd4bf" stroke-opacity="0.45"/>

  <path d="M175 555 L255 510 L335 525 L415 455 L495 470 L575 430 L655 445" fill="none" stroke="#5eead4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="255" cy="510" r="7" fill="#a7f3d0"/>
  <circle cx="415" cy="455" r="7" fill="#a7f3d0"/>
  <circle cx="575" cy="430" r="7" fill="#a7f3d0"/>

  <rect x="770" y="430" width="235" height="26" rx="8" fill="#115e59"/>
  <rect x="770" y="468" width="178" height="26" rx="8" fill="#115e59"/>
  <rect x="770" y="506" width="205" height="26" rx="8" fill="#115e59"/>
  <rect x="770" y="544" width="142" height="26" rx="8" fill="#115e59"/>
</svg>
