<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">JARVIS Virtual Assistant</title>
  <desc id="desc">Voice assistant dashboard with command tiles and waveform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1736"/>
      <stop offset="100%" stop-color="#1f4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="180" fill="#60a5fa" opacity="0.16"/>
  <circle cx="180" cy="640" r="220" fill="#22d3ee" opacity="0.14"/>

  <rect x="110" y="100" width="980" height="560" rx="28" fill="#0f1f45" stroke="#60a5fa" stroke-opacity="0.35"/>
  <text x="160" y="170" fill="#dbeafe" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">JARVIS - Virtual Assistant</text>
  <text x="160" y="210" fill="#93c5fd" font-size="24" font-family="Segoe UI, Arial, sans-serif">Voice commands, search, smart actions</text>

  <rect x="160" y="260" width="320" height="110" rx="16" fill="#1e3a8a"/>
  <rect x="500" y="260" width="320" height="110" rx="16" fill="#1e40af"/>
  <rect x="840" y="260" width="210" height="110" rx="16" fill="#1d4ed8"/>

  <text x="190" y="315" fill="#e0f2fe" font-size="22" font-family="Segoe UI, Arial, sans-serif">Open Google</text>
  <text x="530" y="315" fill="#e0f2fe" font-size="22" font-family="Segoe UI, Arial, sans-serif">Open YouTube</text>
  <text x="870" y="315" fill="#e0f2fe" font-size="22" font-family="Segoe UI, Arial, sans-serif">Wikipedia</text>

  <rect x="160" y="420" width="890" height="170" rx="18" fill="#0b1736" stroke="#38bdf8" stroke-opacity="0.45"/>
  <path d="M190 505 C240 455, 290 555, 340 505 C390 455, 440 555, 490 505 C540 455, 590 555, 640 505 C690 455, 740 555, 790 505 C840 455, 890 555, 940 505" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="980" cy="505" r="32" fill="#22d3ee"/>
  <text x="966" y="513" fill="#082f49" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AI</text>
</svg>
